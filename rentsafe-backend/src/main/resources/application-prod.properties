# ===================================================================
# RentSafe Backend - PROD Profile (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rentsafe
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:rentsafe_admin}
spring.datasource.password=${DB_PASSWORD:rentsafe_secure_2026}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

logging.level.com.rentsafe=INFO
logging.level.org.springframework.security=WARN
