# ===================================================================
# RentSafe Backend - Application Configuration
# ===================================================================
spring.application.name=rentsafe-backend
server.port=8080

# ===================================================================
# ACTIVE PROFILE: Use 'dev' for H2 in-memory, 'prod' for PostgreSQL
# ===================================================================
spring.profiles.active=dev

# ===================================================================
# JPA / Hibernate Common Settings
# ===================================================================
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# ===================================================================
# JWT Security Configuration
# ===================================================================
rentsafe.jwt.secret=RentSafe2026SecureJWTKeyMustBeAtLeast256BitsLongForHS256Algorithm!!
rentsafe.jwt.expiration-ms=86400000
rentsafe.jwt.refresh-expiration-ms=604800000

# ===================================================================
# CORS Configuration
# ===================================================================
rentsafe.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================================================================
# File Upload Configuration
# ===================================================================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
rentsafe.upload.directory=./uploads

# ===================================================================
# reCAPTCHA Configuration
# ===================================================================
# For v3 server-side validation
rentsafe.recaptcha.site-key=YOUR_SITE_KEY_HERE
rentsafe.recaptcha.secret=YOUR_SECRET_KEY_HERE
rentsafe.recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
rentsafe.recaptcha.enabled=false

# ===================================================================
# API Documentation
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
